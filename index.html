<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>ToDo PRO MINI</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>ToDo PRO MINI</h1>

<div id="app">
<input id="taskInput" type="text" placeholder="Wpisz zadanie">
<button id="addBtn">Dodaj</button>

<select id="filter">
<option value="all">Wszystkie</option>
<option value="done">Wykonane</option>
<option value="open">Niewykonane</option>
</select>

<p id="error" class="error"></p>

<ul id="taskList"></ul>
</div>
<script src="script.js"></script>
</body>
</html>
